services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foculmatematic
      POSTGRES_USER: focul
      POSTGRES_PASSWORD: focul
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: change-me-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://focul:focul@db:5432/foculmatematic
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
      CORS_ALLOWED_ORIGINS: http://localhost:8000
      BACKUP_INTERVAL_HOURS: "12"
      BACKUP_RETENTION: "14"
    volumes:
      - backups:/app/backups
    depends_on:
      - db

  backup:
    build: .
    command: python manage.py run_backup_scheduler
    environment:
      DEBUG: "False"
      SECRET_KEY: change-me-in-production
      DATABASE_URL: postgres://focul:focul@db:5432/foculmatematic
      BACKUP_INTERVAL_HOURS: "12"
      BACKUP_RETENTION: "14"
    volumes:
      - backups:/app/backups
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pgdata:
  backups:
