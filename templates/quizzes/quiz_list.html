{% extends "base.html" %}

{% block title %}Chestionare — Focul Matematic{% endblock %}

{% block content %}
<div class="page-content">
<h1>Chestionare</h1>

<div class="class-grid">
    {% for level in class_levels %}
        <article class="card class-grid__item">
            <h2 style="margin:0 0 0.75rem;">Clasa a {{ level }}-a</h2>
            <a class="btn" href="{% url 'class_chapters' level %}">Vezi capitolele</a>
        </article>
    {% endfor %}
</div>
</div>
{% endblock %}
