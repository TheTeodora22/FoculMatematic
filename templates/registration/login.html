{% extends "base.html" %}

{% block title %}Conectare — Focul Matematic{% endblock %}

{% block content %}
<h1>Conectare</h1>
{% if form.errors %}
    <p class="muted">Utilizator sau parolă incorectă.</p>
{% endif %}
<form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="card">
        <p>
            <label for="id_username">Utilizator</label><br>
            {{ form.username }}
        </p>
        <p>
            <label for="id_password">Parolă</label><br>
            {{ form.password }}
        </p>
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit" class="btn">Conectare</button>
</form>
{% endblock %}
