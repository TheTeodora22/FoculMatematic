{% extends "base.html" %}

{% block title %}Pagină negăsită — Focul Matematic{% endblock %}

{% block content %}
<div class="page-content">
    <div class="auth-panel" style="max-width: 36rem; margin: 2rem auto;">
        <h1>Pagina nu a fost găsită</h1>
        <p class="muted">Linkul poate fi greșit sau pagina a fost mutată.</p>
        <div class="auth-actions" style="margin-top: 1.5rem;">
            <a class="btn" href="{% url 'index' %}">Acasă</a>
            <a class="btn" href="{{ report_url }}">Raportează problema</a>
        </div>
    </div>
</div>
{% endblock %}
